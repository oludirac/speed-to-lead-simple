<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Redacted lead summary email example</title>
  <desc id="desc">Landscape email mockup showing an AI-generated lead summary with priority, contact details, job details, and next action.</desc>
  <rect width="1672" height="941" fill="#f4f6f8"/>
  <rect x="96" y="84" width="1480" height="773" rx="36" fill="#ffffff" stroke="#d8dee6" stroke-width="3"/>
  <rect x="96" y="84" width="1480" height="112" rx="36" fill="#172033"/>
  <path d="M96 154 H1576 V196 H96 Z" fill="#172033"/>
  <text x="156" y="154" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Lead Summary Email Example</text>
  <text x="1188" y="154" font-family="Arial, sans-serif" font-size="24" fill="#cbd5e1">leads@example.com</text>

  <rect x="156" y="248" width="340" height="126" rx="22" fill="#eaf8ef" stroke="#b7e4c7" stroke-width="3"/>
  <text x="326" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d7a3b">Priority</text>
  <text x="326" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#14532d">HIGH INTENT</text>

  <text x="560" y="284" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#162033">Example Customer</text>
  <text x="560" y="330" font-family="Arial, sans-serif" font-size="25" fill="#334155">+15550001000</text>
  <text x="560" y="368" font-family="Arial, sans-serif" font-size="25" fill="#334155">customer@example.com</text>
  <text x="560" y="406" font-family="Arial, sans-serif" font-size="25" fill="#334155">AB12 3CD - Homeowner - Detached property</text>

  <line x1="156" y1="456" x2="1516" y2="456" stroke="#e5eaf0" stroke-width="3"/>

  <text x="156" y="525" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#162033">Job</text>
  <text x="156" y="568" font-family="Arial, sans-serif" font-size="25" fill="#273241">External rendering enquiry with clear scope, property details, timing, and photos supplied.</text>

  <text x="156" y="648" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#162033">Missing</text>
  <text x="156" y="691" font-family="Arial, sans-serif" font-size="25" fill="#273241">None obvious.</text>

  <text x="156" y="771" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#162033">Next</text>
  <text x="156" y="814" font-family="Arial, sans-serif" font-size="25" fill="#273241">Call back and arrange site visit.</text>

  <rect x="1110" y="510" width="406" height="284" rx="28" fill="#f8fafc" stroke="#dbe3ed" stroke-width="3"/>
  <text x="1160" y="575" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#162033">AI Summary Output</text>
  <text x="1160" y="625" font-family="Arial, sans-serif" font-size="22" fill="#475569">Structured lead card</text>
  <text x="1160" y="665" font-family="Arial, sans-serif" font-size="22" fill="#475569">Qualification score</text>
  <text x="1160" y="705" font-family="Arial, sans-serif" font-size="22" fill="#475569">Practical next action</text>
  <text x="1160" y="745" font-family="Arial, sans-serif" font-size="22" fill="#475569">Ready for owner review</text>
</svg>
