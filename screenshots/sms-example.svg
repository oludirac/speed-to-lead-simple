<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Redacted SMS example</title>
  <desc id="desc">Landscape SMS mockup showing an automated missed-call follow-up message with a lead form link.</desc>
  <rect width="1672" height="941" fill="#0b0f14"/>
  <rect x="96" y="84" width="1480" height="773" rx="36" fill="#111820" stroke="#293445" stroke-width="3"/>
  <text x="156" y="165" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#f4f7fb">SMS Example</text>
  <text x="156" y="208" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Automated response sent immediately after a qualifying call event</text>

  <rect x="156" y="270" width="1360" height="475" rx="28" fill="#05070a"/>
  <text x="836" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#9ca3af">Today 18:12</text>

  <path d="M250 430 Q250 382 298 382 H1160 Q1208 382 1208 430 V596 Q1208 644 1160 644 H334 L274 704 V644 Q250 644 250 596 Z" fill="#252a32"/>
  <text x="312" y="448" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#f7ead6">
    <tspan x="312" dy="0">Hi, this is Example Home Services. Sorry we missed your call.</tspan>
    <tspan x="312" dy="60">For a new job enquiry, please fill this in:</tspan>
  </text>
  <text x="312" y="570" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#48a6ff" text-decoration="underline">https://example.com/lead-form</text>

  <rect x="1260" y="382" width="190" height="262" rx="22" fill="#172033" stroke="#334155" stroke-width="2"/>
  <text x="1355" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#d9f99d">24h</text>
  <text x="1355" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1">duplicate</text>
  <text x="1355" y="538" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1">SMS guard</text>
  <text x="1355" y="586" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">prevents repeat</text>
  <text x="1355" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">texts</text>
</svg>
